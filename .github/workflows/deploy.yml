name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: cescom.cl
          username: cescomc1
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 9022
          script: |
            cd /home/cescomc1/repositories/cescom-website
            git pull origin main
            rsync -av --exclude='.git' --exclude='.github' /home/cescomc1/repositories/cescom-website/ /home/cescomc1/public_html/
            find /home/cescomc1/public_html -type f -exec chmod 644 {} \;
            find /home/cescomc1/public_html -type d -exec chmod 755 {} \;
